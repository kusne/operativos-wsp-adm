<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="/operativos-wsp-adm/favicon.ico">
  <meta charset="UTF-8" />
  <title>Informes WhatsApp</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../SHARED/STYLES/base.css" />
  <link rel="stylesheet" href="./wsp.css" />
</head>

<body>
  <div class="app">
    
    <div class="brand">
      <div class="brand-text">
        <h3>Generador de Informes</h3>
        <div class="brand-sub">Brigada Motorizada Zona Centro Norte</div>
      </div>

      <img src="/operativos-wsp-adm/WSP/logo_fondo_transparente.png" alt="Sello" class="brand-logo">
    </div>

    <div id="bloquePresenciaActiva" class="control-opcion hidden">
      <label class="check check-inline-opcion" id="wrapPresenciaActiva">
        <input type="checkbox" id="presenciaActiva">
        <span>Presencia activa por clima?</span>
      </label>
    </div>

    <label class="top-label">INICIA/FINALIZA</label>
    <select id="tipo" class="obligatorio">
      <option value="">Seleccionar</option>
      <option value="INICIA" selected>INICIA</option>
      <option value="FINALIZA">FINALIZA</option>
      <option value="CONTROL SUPERIOR">CONTROL SUPERIOR</option>
    </select>

    <label class="top-label">OPERATIVOS</label>
    <select id="horario" class="obligatorio">
      <option value="">Seleccionar Operativo</option>
    </select>

    <!-- PERSONAL -->
    <div class="section obligatorio destacado" id="bloquePersonal">
      <label>Personal Policial</label>

      <div class="grid-personal">
        <label class="check check-chip">
          <span>Subinspector Mariaux</span>
          <input type="checkbox" class="personal" value="Subinspector Mariaux A.">
        </label>


        <label class="check check-chip">
          <span>Oficial Cardozo</span>
          <input type="checkbox" class="personal" value="Oficial Cardozo A.">
        </label>


        <label class="check check-chip">
          <span>Suboficial Pintos J.</span>
          <input type="checkbox" class="personal" value="Suboficial Pintos J.">
        </label>


        <label class="check check-chip">
          <span>Suboficial Aquino F.</span>
          <input type="checkbox" class="personal" value="Suboficial Aquino F.">
        </label>


        <label class="check check-chip">
          <span>Suboficial Lascurain I.</span>
          <input type="checkbox" class="personal" value="Suboficial Lascurain I.">
        </label>


        <label class="check check-chip">
          <span>Suboficial Delgado Y.</span>
          <input type="checkbox" class="personal" value="Suboficial Delgado Y.">
        </label>
      </div>
    </div>

    <!-- MOVILES + MOTOS -->
    <div class="section obligatorio destacado" id="bloqueMovil">
      <label>Móviles:</label>


      <div class="grid-moviles">
        <label class="check check-chip"><span>12428</span><input type="checkbox" class="movil" value="12428"></label>
        <label class="check check-chip"><span>10139</span><input type="checkbox" class="movil" value="10139"></label>
        <label class="check check-chip"><span>12502</span><input type="checkbox" class="movil" value="12502"></label>
      </div>


      <label class="subtitulo">Motos:</label>


      <div class="grid-motos">
        <label class="check check-chip"><span>9092</span><input type="checkbox" class="moto" value="9092"></label>
        <label class="check check-chip"><span>8989</span><input type="checkbox" class="moto" value="8989"></label>
        <label class="check check-chip"><span>12089</span><input type="checkbox" class="moto" value="12089"></label>
        <label class="check check-chip"><span>12090</span><input type="checkbox" class="moto" value="12090"></label>
        <label class="check check-chip"><span>9029</span><input type="checkbox" class="moto" value="9029"></label>
        
        <label class="check check-chip"><span>9030</span><input type="checkbox" class="moto" value="9030"></label>
        <label class="check check-chip"><span>12091</span><input type="checkbox" class="moto" value="12091"></label>
        <label class="check check-chip"><span>12087</span><input type="checkbox" class="moto" value="12087"></label>
        <label class="check check-chip"><span>12088</span><input type="checkbox" class="moto" value="12088"></label>
      </div>
    </div>
    
    <!-- MISMOS DATOS DE INICIO (solo FINALIZA) -->
    <div class="section hidden destacado" id="bloqueMismosElementos">
      <div class="fila-mismos-datos">
        <label class="check check-chip" id="wrapMismoPersonal">
          <span>Mismo personal</span>
          <input type="checkbox" id="mismoPersonal">
        </label>

        <label class="check check-chip" id="wrapMismoMovil">
          <span>Mismo móvil</span>
          <input type="checkbox" id="mismoMovil">
        </label>

        <label class="check check-chip" id="wrapMismosElementos">
          <span>Elementos de Inicio</span>
          <input type="checkbox" id="mismosElementos">
        </label>
      </div>
    </div>

    <!-- ESCOPETA -->
    <div class="section destacado" id="bloqueEscopeta">
      <label>ESCOPETA</label>

      <div class="fila-escopetas">
        <label class="check check-chip"><span>N°650367</span><input type="checkbox" class="ESCOPETA" value="N°650367"></label>
        <label class="check check-chip"><span>N°650368</span><input type="checkbox" class="ESCOPETA" value="N°650368"></label>
      </div>
    </div>

    <!-- HT -->
    <div class="section destacado" id="bloqueHT">
      <label>HT</label>

      <div class="fila-ht">
        <label class="check check-chip"><span>N°02</span><input type="checkbox" class="HT" value="N°02"></label>
        <label class="check check-chip"><span>N°06</span><input type="checkbox" class="HT" value="N°06"></label>
        <label class="check check-chip"><span>N°08</span><input type="checkbox" class="HT" value="N°08"></label>
        <label class="check check-chip"><span>N°V03</span><input type="checkbox" class="HT" value="N°V03"></label>
      </div>
    </div>

    <!-- PDA -->
    <div class="section destacado" id="bloquePDA">
      <label>PDA</label>

      <div class="fila-pda">
        <label class="check check-chip"><span>05</span><input type="checkbox" class="PDA" value="05"></label>
        <label class="check check-chip"><span>19</span><input type="checkbox" class="PDA" value="19"></label>
        <label class="check check-chip"><span>67</span><input type="checkbox" class="PDA" value="67"></label>
        <label class="check check-chip"><span>68</span><input type="checkbox" class="PDA" value="68"></label>
      </div>
    </div>

    <!-- IMPRESORA -->
    <div class="section destacado" id="bloqueImpresora">
      <label>IMPRESORA</label>

      <div class="fila-impresora">
        <label class="check check-chip"><span>N°64</span><input type="checkbox" class="IMPRESORA" value="N°64"></label>
        <label class="check check-chip"><span>N°39</span><input type="checkbox" class="IMPRESORA" value="N°39"></label>
      </div>
    </div>

    <!-- ALOMETRO -->
    <div class="section destacado" id="bloqueAlometro">
      <label>Alómetro</label>

      <div class="fila-alometro">
        <label class="check check-chip"><span>AREC-0127</span><input type="checkbox" class="Alometro" value="AREC-0127"></label>
        <label class="check check-chip"><span>ARTL-0425</span><input type="checkbox" class="Alometro" value="ARTL-0425"></label>
        <label class="check check-chip"><span>ARSA-0360</span><input type="checkbox" class="Alometro" value="ARSA-0360"></label>
      </div>
    </div>

    <!-- ALCOHOLIMETRO -->
    <div class="section destacado" id="bloqueAlcoholimetro">
      <label>Alcoholímetro</label>

      <div class="fila-alcoholimetro">
        <label class="check check-chip"><span>AREC-0732</span><input type="checkbox" class="Alcoholimetro" value="AREC-0732"></label>
        <label class="check check-chip"><span>ARSH-0149</span><input type="checkbox" class="Alcoholimetro" value="ARSH-0149"></label>
        <label class="check check-chip"><span>ARLM-0652</span><input type="checkbox" class="Alcoholimetro" value="ARLM-0652"></label>
      </div>
    </div>

    <div id="bloqueControlSuperior" class="section hidden destacado">
      <label>CONTROL SUPERIOR</label>

      <div class="fila-control-superior">
        <label class="check check-chip control-superior-chip" id="wrapControlSuperiorJefe">
          <input type="checkbox" id="controlSuperiorJefe" class="control-superior-rol">
          <span>JEFE</span>
        </label>

        <label class="check check-chip control-superior-chip" id="wrapControlSuperiorSubjefe">
          <input type="checkbox" id="controlSuperiorSubjefe" class="control-superior-rol">
          <span>SUBJEFE</span>
        </label>

        <label class="check check-chip control-superior-chip" id="wrapControlSuperiorOtros">
          <input type="checkbox" id="controlSuperiorOtros" class="control-superior-rol">
          <span>OTROS</span>
        </label>
      </div>

      <div id="bloqueControlSuperiorOtrosTexto" class="control-superior-otros hidden">
        <label for="controlSuperiorOtrosTexto">Otros</label>
        <input type="text" id="controlSuperiorOtrosTexto" placeholder="Nombre y apellido">
      </div>

      <div class="fila-control-superior-acciones">
        <label class="check check-chip control-superior-chip control-superior-chip-secundario" id="wrapControlSuperiorConMovil">
          <input type="checkbox" id="controlSuperiorConMovil">
          <span>Con móvil?</span>
        </label>

        <label class="check check-chip control-superior-chip control-superior-chip-secundario" id="wrapControlSuperiorSeAcopla">
          <input type="checkbox" id="controlSuperiorSeAcopla">
          <span>Se acopla?</span>
        </label>
      </div>
    </div>

    <!-- FINALIZA -->
    <div id="finaliza" class="section hidden destacado">
      <div id="bloqueMostrarResultadosFinaliza" class="control-opcion hidden">
        <label class="check check-inline-opcion" id="wrapMostrarResultadosFinaliza">
          <input type="checkbox" id="mostrarResultadosFinaliza">
          <span>Ver items</span>
        </label>
      </div>

      <div id="contenidoResultadosFinaliza">
      <label id="tituloResultadosFinaliza">Resultados</label>

      <div class="resultado-item">
        <label for="vehiculos" class="gold-title">Vehículos Fiscalizados:</label>
        <input type="number" id="vehiculos" min="0" inputmode="numeric" placeholder="15">
      </div>

      <div class="resultado-item">
        <label for="personas" class="gold-title">Personas Identificadas:</label>
        <input type="number" id="personas" min="0" inputmode="numeric">
      </div>

      <div class="resultado-item">
        <label for="testalom" class="gold-title">Test de Alómetro:</label>
        <input type="number" id="testalom" min="0" inputmode="numeric">
      </div>

      <div class="resultado-item">
        <label for="Alcotest" class="gold-title">Test de Alcoholímetro:</label>
        <input type="number" id="Alcotest" min="0" inputmode="numeric">
      </div>

      <div id="bloquePositivosAlcoholimetro" class="resultado-subgrupo hidden">
        <div class="resultado-item">
          <label for="positivaSancionable" class="gold-title">Positiva Sancionable:</label>
          <input type="number" id="positivaSancionable" min="0" inputmode="numeric">
        </div>

        <div id="wrapGraduacionesSancionable" class="resultado-item resultado-item-graduaciones hidden">
          <label class="gold-title">Graduaciones:</label>
          <div id="graduacionesSancionable" class="graduaciones-inline" aria-live="polite"></div><span id="unitGraduacionesSancionable" class="graduaciones-unit hidden">g/l</span>
        </div>

        <div class="resultado-item">
          <label for="positivaNoSancionable" class="gold-title">Positiva no Sancionable:</label>
          <input type="number" id="positivaNoSancionable" min="0" inputmode="numeric">
        </div>

        <div id="wrapGraduacionesNoSancionable" class="resultado-item resultado-item-graduaciones hidden">
          <label class="gold-title">Graduaciones:</label>
          <div id="graduacionesNoSancionable" class="graduaciones-inline" aria-live="polite"></div><span id="unitGraduacionesNoSancionable" class="graduaciones-unit hidden">g/l</span>
        </div>
      </div>

      <div class="resultado-item">
        <label for="actas" class="gold-title">Actas Labradas:</label>
        <input type="number" id="actas" min="0" inputmode="numeric">
      </div>

      <div class="resultado-item">
        <label for="Requisa" class="gold-title">Requisas:</label>
        <input type="number" id="Requisa" min="0" inputmode="numeric">
      </div>

      <div class="resultado-item">
        <label for="qrz" class="gold-title">Qrz:</label>
        <input type="number" id="qrz" min="0" inputmode="numeric">
      </div>

      <div id="wrapQrzCasilleros" class="resultado-item resultado-item-sublista hidden">
        <label class="gold-title">Documentos Qrz:</label>
        <div id="qrzCasilleros" class="casilleros-verticales" aria-live="polite"></div>
      </div>

      <div class="resultado-item">
        <label for="dominio" class="gold-title">Dominio:</label>
        <input type="number" id="dominio" min="0" inputmode="numeric">
      </div>

      <div id="wrapDominioCasilleros" class="resultado-item resultado-item-sublista hidden">
        <label class="gold-title">Dominios:</label>
        <div id="dominioCasilleros" class="casilleros-verticales" aria-live="polite"></div>
      </div>

      <div class="medidas-cautelares-ui">
        <label class="gold-title medidas-title">Medidas Cautelares:</label>

        <div class="resultado-item">
          <label for="Remision" class="gold-title">Remisión:</label>
          <input type="number" id="Remision" min="0" inputmode="numeric">
        </div>

        <div class="resultado-item">
          <label for="Retencion" class="gold-title">Retención:</label>
          <input type="number" id="Retencion" min="0" inputmode="numeric">
        </div>

        <div class="resultado-item">
          <label for="Prohibicion" class="gold-title">Prohibición de Circulación:</label>
          <input type="number" id="Prohibicion" min="0" inputmode="numeric">
        </div>

        <div class="resultado-item">
          <label for="Cesion" class="gold-title">Cesión de Conducción:</label>
          <input type="number" id="Cesion" min="0" inputmode="numeric">
        </div>
      </div>
      </div>
    </div>

    <div id="bloqueDetalles" class="section hidden destacado">
      <label>Detalles:</label>
      <textarea id="detalles" rows="3" placeholder="(01) 2016 Alcoholemia"></textarea>
    </div>

    <div id="bloqueObservacionesNormal">
      <label for="obs">Observaciones:</label>
      <textarea id="obs" rows="3" placeholder="Se realizó (01) verificación por animales sueltos
o se realizó (01) Procedimiento Policial"></textarea>
    </div>

    <button type="button" id="btnEnviar">Enviar por WhatsApp</button>

  </div>

  <!-- shared -->
  <script src="../SHARED/JS/storage.js" defer></script>
  <script src="../SHARED/JS/dom.js" defer></script>
  <script src="../SHARED/JS/uiValidation.js" defer></script>
  <script src="../SHARED/JS/dates.js" defer></script>
  <script src="../SHARED/JS/ordersSync.js" defer></script>

  <!-- wsp -->
  <script src="./nomenclador.js" defer></script>
  <script src="./controlsuperior.js" defer></script>
  <script src="./wsp.js" defer></script>
</body>
</html>
